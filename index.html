  {id:"1.2",grp:"1",gname:"การกำกับดูแล DT และแผนปฏิบัติการดิจิทัล",gw:25,gs68:2.75,name:"แผนปฏิบัติการดิจิทัลระยะ 3-5 ปี (Digital Roadmap)",w:12.5,s68:2.75,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กำหนดกระบวนการจัดทำแผนปฏิบัติการดิจิทัลและแผนประจำปีอย่างเป็นระบบ สามารถทำซ้ำได้และเป็นมาตรฐาน","แผนมีความเชื่อมโยงกับแผนวิสาหกิจและนโยบายต่างๆ อย่างชัดเจน","มีการวิเคราะห์ผู้มีส่วนได้ส่วนเสีย ทำแผนสื่อสาร และมีการประเมินผลการรับรู้","เริ่มมีการแสดงรายละเอียดแผนครอบคลุม Digital Transformation ทั้งด้านกระบวนการ บุคลากร เทคโนโลยี"],
  results:["(L1-2) มีคู่มือปฏิบัติงานการทำแผน แผนดิจิทัล 68-70 เชื่อมโยงปัจจัยนำเข้า (SWOT, แผนวิสาหกิจ, แผนแม่บทต่างๆ) อย่างครบถ้วน","(L3) มีการวิเคราะห์ผู้มีส่วนได้ส่วนเสีย (RACI) แผนสื่อสาร ประเมินการรับรู้ และระบุว่าได้นำแผนไปปฏิบัติผ่านโครงการ เช่น Digital Twin LCP","(L4-5) มีการกำหนดการวัด ติดตาม วิเคราะห์ตัววัดผลลัพธ์ (Outcome) และนำผลลัพธ์เข้าสู่กระบวนการทบทวนเพื่อปรับปรุงแผน"],
  gaps:["หลักฐาน Implementation ยังไม่สะท้อนภาพรวมทั้งองค์กร และเป้าหมายส่วนใหญ่ยังไม่เป็นแบบ SMART หรือไม่สะท้อน Outcome ที่แท้จริง","จุดตาย: แผน Roadmap ขาดความเชื่อมโยงกับมิติของ 'คน' (HR) ซึ่งเป็นข้อต่อสำคัญในการทำ Digital Transformation — TRIS เรียก 'แผนทิ้งคนไว้ข้างหลัง'"],
  actions:["บูรณาการแผน DT ร่วมกับ HR อย่างใกล้ชิด: ต้องระบุว่าโครงการดิจิทัลแต่ละโครงการส่งผลกระทบต่ออัตรากำลังอย่างไร และมีแผน Upskill/Reskill รองรับ","ตั้งเป้าหมายแบบ SMART: ตัวชี้วัดต้องเฉพาะเจาะจง วัดได้ ทำได้จริง มีกรอบเวลาชัดเจน","ยกระดับการประเมินผลสื่อสาร: เปลี่ยนจากวัด 'จำนวนคนที่รับทราบ' ไปเป็นวัด 'ร้อยละพนักงานที่เข้าใจบทบาทตนเองในแผน Digital Roadmap'"],
  docs:["แผนบริหารจัดการผลกระทบด้านบุคลากร (HR Impact & Mitigation Plan): จัดทำร่วมกับฝ่าย HR แสดงการวางแผนกำลังคน การโยกย้าย และแผน Upskill/Reskill","หลักฐานการประเมิน 'ประสิทธิผล' ของกระบวนการจัดทำแผน: รายงานแสดงว่าแผนถูกนำไปใช้จริงและประสบความสำเร็จกี่เปอร์เซ็นต์ อะไรคือคอขวด","รายงานผลสัมฤทธิ์เชิงประจักษ์ (Implementation Report): สถิติหรือ Use Case แสดงว่ากระบวนการดิจิทัลทั่วองค์กรสร้าง Outcome อะไรให้ กทท. บ้าง"],
  bp:["ทั้ง 3 องค์กรได้คะแนนเท่ากันที่ 2.7500 และติดปัญหาเดียวกัน: 'ต้องประเมินประสิทธิภาพการสื่อสารอย่างครอบคลุม' และ 'ยังไม่พบหลักฐาน Implementation ที่ชัดเจน' — ใครโชว์หลักฐาน Implementation รวมมิติ HR ได้ก่อนจะเป็นผู้นำกลุ่ม"]},
  {id:"2.1",grp:"2",gname:"การนำเทคโนโลยีดิจิทัลมาปรับใช้ทั่วองค์กร (Digital Transformation)",gw:25,gs68:2.166,name:"การวิเคราะห์และจัดทำสถาปัตยกรรมองค์กร (Enterprise Architecture)",w:9,s68:2.166,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กำหนดกระบวนการวิเคราะห์และจัดทำ EA แสดงภาพปัจจุบัน (As-Is) และอนาคต (To-Be)","EA ครอบคลุมครบ 5 ด้าน: Business, Data, Application, Infrastructure และ Security Architecture","เริ่มมีการกำหนดแนวทางการประเมินประสิทธิผลและความคุ้มค่าของการนำ DT มาปรับใช้"],
  results:["(L1-2) มีคู่มือ EA As-Is และ To-Be ครบทั้ง 5 มิติ","(L3-5) ระบุว่ามีการกำหนดการวัด ติดตาม วิเคราะห์ตัววัดผลลัพธ์ (Outcome) และนำผลลัพธ์เข้าสู่กระบวนการทบทวนเพื่อปรับปรุงและทำนวัตกรรม"],
  gaps:["กทท. สอบผ่านแค่ L1-2 (มีเอกสาร As-Is/To-Be) — ตกใน L3 เพราะ EA ยังเป็นแค่ 'กระดาษพิมพ์เขียว' ไม่ได้บังคับใช้กับโครงการ IT จริง","ขาดรายละเอียดผลลัพธ์แบบองค์รวม (People, Process, Technology) โดยเฉพาะมิติ 'คน' เช่น Upskill/Reskill","ขาดการประเมินมูลค่า (Public Value และ Business Value) เชิงตัวเลข"],
  actions:["บังคับใช้ EA กับทุกโครงการ IT: ตั้งกฎเกณฑ์ให้ทุกโครงการดิจิทัลต้องผ่าน EA Compliance ก่อนอนุมัติ","วัดผลลัพธ์ใน 3 มิติ (PPT): ตัวชี้วัดโครงการต้องวัดว่ากระบวนการ (Process) ไร้รอยต่อขึ้นอย่างไร และคน (People) ได้รับการ Upskill/Reskill อย่างไร","เน้นการสร้าง Public Value และ Business Value: แปลงผลลัพธ์ระบบดิจิทัลออกมาเป็นตัวเลขทางเศรษฐศาสตร์และการเพิ่มขีดความสามารถ"],
  docs:["EA Compliance Checklist: เอกสาร/รายงานการพิจารณาอนุมัติโครงการ IT โดยอิงจากกรอบ EA เพื่อพิสูจน์ว่า EA ถูกนำไปใช้คัดกรองโครงการจริง","Digital Transformation Outcome Report: รายงานผลสัมฤทธิ์ที่มีสถิติครบทั้ง 3 ด้าน (People, Process, Tech) รวมถึงข้อมูลการ Upskill/Reskill พนักงาน","Value Realization Report: แสดง Public Value (ลดเวลาประชาชน/ผู้ประกอบการ) และ Business Value (ต้นทุนลดลง รายได้เพิ่มขึ้น)"],
  bp:["รฟม. (MRTA) ทำคะแนนสูงสุดในกลุ่ม (2.8267) เพราะมีกระบวนการและมาตรฐานที่แข็งแกร่ง มีการถ่ายทอดแนวทางปฏิบัติเดียวกันทั่วองค์กร และประเมินการรับรู้ผู้มีส่วนได้ส่วนเสียครบถ้วน","กทพ. (EXAT) ทำคะแนน 2.5067 — กทท. ต้องเร่งเครื่องด้านการสื่อสาร การตั้งกรอบประเมินผล และพิสูจน์ผลลัพธ์ฝั่ง 'คน' (People) เพื่อไล่ตาม"]},
  {id:"2.2",grp:"2",gname:"การนำเทคโนโลยีดิจิทัลมาปรับใช้ทั่วองค์กร (Digital Transformation)",gw:25,gs68:2.166,name:"การบริหารโครงการและการดำเนินงาน DT อย่างมีประสิทธิภาพ (Project Management)",w:8,s68:2.166,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กำหนดกระบวนการบริหารโครงการและแนวปฏิบัติที่เป็นระบบ ทำซ้ำได้ และเป็นมาตรฐาน","ขอบเขตครอบคลุมตั้งแต่การบริหารแผนงาน Requirement การแก้ปัญหา Change Management และการยอมรับการเปลี่ยนแปลง","มีการกำหนดแนวทางประเมินความสำเร็จ แผนบริหารความเสี่ยงโครงการ และ Post-implementation Review","มีการถ่ายทอดแนวปฏิบัติทั่วองค์กร วิเคราะห์ผู้มีส่วนได้ส่วนเสีย และเริ่มประเมินการรับรู้"],
  results:["(L1-2) มี 'คู่มือการบริหารโครงการด้าน DT' ครอบคลุม TOR, ROI, การบริหารความเสี่ยง และ Change Management","(L3) มีการทำ Stakeholder Analysis, RACI Matrix, แผนสื่อสาร และรายงานสรุปผลการประเมินการรับรู้ของพนักงาน","(L4-5) มีการกำหนดตัวชี้วัดผลลัพธ์ (Outcome) มีการประเมินหลังสิ้นสุดโครงการ (Lesson Learned) และรายงานผลต่อคณะกรรมการ"],
  gaps:["หลักฐาน Implementation ยังไม่ชัดเจน: การมีคู่มือและแผนสื่อสาร (L1-3) ยังไม่เพียงพอ หากไม่สามารถพิสูจน์ว่าผู้ปฏิบัติงานนำไปใช้บริหารโครงการได้จริงทั้งองค์กร","กับดัก Output vs Outcome: ตัววัดส่วนใหญ่เป็น Output เช่น 'โครงการเสร็จตามเวลา' ไม่ได้สะท้อน Outcome เช่น 'โครงการทำให้รายได้เพิ่มขึ้นเท่าไร'","ขาดการกำหนด Leading และ Lagging Indicator เพื่อนำไปสู่การปรับปรุงกระบวนการอย่างต่อเนื่อง"],
  actions:["รื้อระบบ KPIs: กำหนด Leading Indicator (เช่น ความพร้อมของระบบทดสอบ) และ Lagging Indicator (เช่น ความพึงพอใจหลังการใช้งานจริง) และเปลี่ยนจาก Output ไปสู่ Outcome","ยกระดับการวัดผลการสื่อสาร: วัดว่าร้อยละ 90 ของ Project Manager เข้าใจและสามารถเขียน TOR / บริหารโครงการตามมาตรฐานใหม่ได้จริง"],
  docs:["Project Implementation Use Cases: เลือกโครงการ IT สำคัญมาทำแฟ้มผลงาน (Portfolio) แสดงตั้งแต่ Stakeholder Analysis ไปจนถึง Post-Implementation Review ตามมาตรฐานคู่มือเป๊ะๆ","Outcome Dashboard & Report: สรุปผลลัพธ์โครงการดิจิทัลที่ระบุ Leading/Lagging Indicator และ Outcome จับต้องได้","รายงานการประเมิน 'ประสิทธิภาพ' การสื่อสาร: เจาะลึกถึงระดับความเข้าใจของผู้ปฏิบัติงาน ไม่ใช่แค่ยอดผู้เข้าร่วมรับฟัง"],
  bp:["รฟม. (2.8267) ทำคะแนนสูงสุด เพราะความครอบคลุมของการวิเคราะห์กระบวนการและการประเมินการรับรู้ชัดเจนกว่า","Quick Win: ตั้งโฟลเดอร์ 'ตัวอย่างความสำเร็จของโครงการ (Project Use Cases)' รวมเอกสาร End-to-End ตั้งแต่ใบขออนุมัติแรกจนถึงใบปิดโครงการและผลประเมิน Outcome — นี่คือหลักฐาน Implementation ชั้นดี"]},
  {id:"2.3",grp:"2",gname:"การนำเทคโนโลยีดิจิทัลมาปรับใช้ทั่วองค์กร (Digital Transformation)",gw:25,gs68:2.166,name:"การจัดการด้านคุณภาพ (Quality Management)",w:8,s68:2.166,status:"ยังไม่เริ่ม",statusNote:"",

  results:["(L1-2) มีคู่มือกระบวนการจัดการคุณภาพ ครอบคลุมการกำหนดมาตรฐาน เครื่องมือ/เทคนิค Quality Management Plan, QMS Good Practices และ Computer Audit","(L3) มีการวิเคราะห์ผู้มีส่วนได้ส่วนเสีย (RACI Chart) และถ่ายทอดกระบวนการแก่ผู้มีส่วนได้ส่วนเสีย","(L4-5) มีการกำหนดการวัด ติดตาม วิเคราะห์ตัววัดผลลัพธ์ (Outcome) และนำผลลัพธ์เข้าสู่กระบวนการทบทวนปรับปรุง"],
  gaps:["เอกสารที่มีอยู่ยังไม่ตอบโจทย์ระดับ 2: TRIS มองว่า กทท. 'เพิ่งจะเริ่มมีแนวทาง' และ QMS Good Practices ยังไม่ชัดเจนพอ กระบวนการยังไม่เป็น Standardized Practice","ขาดหลักฐานการนำไปใช้จริงทั่วองค์กร: ตัวชี้วัดยังไม่ใช่ Leading/Lagging Indicator ที่สามารถประเมินประสิทธิผลเพื่อปรับปรุงงานได้อย่างแท้จริง"],
  actions:["จัดทำคู่มือและตัวอย่าง QMS Good Practices ให้ชัดเจน: รวบรวม Use Cases หรือตัวอย่างการทำงานด้านคุณภาพที่ประสบความสำเร็จ","พัฒนาระบบ KPIs: กำหนด Leading (เช่น อัตราความผิดพลาดระหว่างทดสอบระบบ) และ Lagging (เช่น จำนวนปัญหาด้านคุณภาพหลังส่งมอบ) Indicator","ยกระดับ Implementation: นำมาตรฐานคุณภาพไปบังคับใช้กับทุกโครงการพัฒนาดิจิทัลอย่างเป็นระบบ"],
  docs:["คู่มือ QMS Good Practices (ฉบับปรับปรุง): เนื้อหาละเอียดขึ้น พร้อมตัวอย่างกรณีศึกษาเชิงปฏิบัติ","Quality Control/Assurance Report: หลักฐานที่พิสูจน์ว่ามีการนำเครื่องมือคุณภาพไปใช้ในการพัฒนาโครงการจริง","Dashboard แสดงตัวชี้วัด Leading และ Lagging Indicators ด้านคุณภาพของระบบดิจิทัล พร้อมการวิเคราะห์เพื่อนำไปสู่การปรับปรุง"],
  bp:["รฟม. และ กทพ. ได้รับการยอมรับว่า 'มีมาตรฐานด้านคุณภาพ มี Quality Management Plan มี QMS Good Practices ที่เป็นระบบทำซ้ำได้ (Repeatable)' — กทท. ยังต้องตามให้ทัน"]},
  {id:"3.1",grp:"3",gname:"การบูรณาการเชื่อมโยงข้อมูลระหว่างหน่วยงาน (Government Integration)",gw:10,gs68:3.0,name:"การบูรณาการเชื่อมโยงข้อมูลและการดำเนินงานร่วมกันระหว่างหน่วยงาน",w:10,s68:3.0,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กำหนดกระบวนการบูรณาการเชื่อมโยงข้อมูลและการดำเนินงานร่วมกันระหว่างหน่วยงานทั้งภาครัฐและเอกชนอย่างเป็นระบบ ทำซ้ำได้ เป็นมาตรฐาน","มีเกณฑ์การพิจารณาเลือกคู่ความร่วมมือ (Partner Selection) อย่างเหมาะสม","มีหลักฐาน Implementation ที่ชัดเจน: เช่น การทำ MOU แลกเปลี่ยนข้อมูลกับกรมการขนส่งทางบก (ขบ.) เพื่อติดตามรถบรรทุกและควบคุมความปลอดภัย","มีการถ่ายทอดกระบวนการ วิเคราะห์ผู้มีส่วนได้ส่วนเสีย ทำแผนสื่อสาร และประเมินผลการรับรู้ครบถ้วน"],
  results:["(L1-2) มี 'คู่มือและนโยบายการบูรณาการเชื่อมโยงข้อมูล' กำหนดเกณฑ์เลือกคู่ความร่วมมือ และมีการต่ออายุ/จัดทำ MOU ร่วมกับหน่วยงานภายนอก","(L3) มี RACI Matrix วิเคราะห์ผู้มีส่วนได้ส่วนเสีย สื่อสารให้พนักงานภายในและหน่วยงานภายนอกรับทราบ และมีการประเมินการรับรู้ครบถ้วน","(L4-5) มีการกำหนดตัวชี้วัดผลลัพธ์ ทำแบบสำรวจความพึงพอใจคู่ความร่วมมือ (เช่น กรมการขนส่งทางบก) และนำรายงานผลประเมินเสนอต่อผู้บริหาร"],
  gaps:["ช่องว่าง Level 4-5: TRIS มองว่า 'แบบสำรวจความพึงพอใจ' หรือ 'จำนวน MOU ที่ทำสำเร็จ' เป็นเพียง Output — TRIS ต้องการ Outcome เช่น การเชื่อมโยงข้อมูลกับ ขบ. ทำให้ลดเวลาดำเนินงานได้กี่เปอร์เซ็นต์ ลดความผิดพลาด หรือลดต้นทุนทางสังคมได้เท่าไร","ขาด Leading/Lagging Indicator และขาดการนำระบบดิจิทัล/บูรณาการข้อมูลไปยกระดับกลยุทธ์องค์กร"],
  actions:["เปลี่ยน KPIs จาก Output เป็น Outcome: ยกเลิกการใช้ความพึงพอใจเป็นตัวชี้วัดหลัก เปลี่ยนไปวัดผลลัพธ์จากการเชื่อมโยง เช่น เพิ่มประสิทธิภาพงาน ลดเอกสาร หรือบริการเบ็ดเสร็จ ณ จุดเดียว","สร้าง Leading และ Lagging Indicator: เช่น ความพร้อมของ API (Leading) และปริมาณธุรกรรมที่ทำได้อัตโนมัติ (Lagging)","ยกระดับการบูรณาการข้อมูลสู่ระดับกลยุทธ์ (Strategic Level): ขยายการเชื่อมโยงให้ครอบคลุม Data Analytics"],
  docs:["Integration Outcome Report: สรุปผลลัพธ์จากการเชื่อมโยงข้อมูลกับหน่วยงานต่างๆ เป็นสถิติตัวเลข เช่น ชั่วโมงการทำงานที่ลดลง ความผิดพลาดของข้อมูลที่ลดลง งบประมาณที่ประหยัดได้","Dashboard แสดง Leading และ Lagging Indicators สำหรับวัดประสิทธิภาพการเชื่อมโยงข้อมูลและ API","Cross-agency Data Analytics Report: แสดงให้เห็นว่า กทท. นำข้อมูลจากหน่วยงานอื่นมาประกอบการวางแผนหรือกำหนดกลยุทธ์ทางธุรกิจอย่างไร"],
  bp:["กทท. เป็น Best Practice ในกลุ่มนี้! คะแนน 3.0000 นำหน้า รฟม. และ กทพ. (2.8333) เพราะสามารถพิสูจน์ Implementation ได้ชัดเจนกว่าผ่านการเจรจาต่ออายุและเซ็น MOU กับ ขบ. — รฟม. และ กทพ. ถูก TRIS วิจารณ์ว่า 'ยังไม่พบหลักฐาน Implementation ที่ชัดเจน'","Quick Win ปี 69: แก้ปัญหา GFMIS-SOE ให้ส่งข้อมูลตรงเวลา และเปลี่ยนตัวชี้วัดโครงการ One Stop e-Port Service จาก 'ความพึงพอใจ' เป็น 'มูลค่าเวลา/ต้นทุนที่ผู้ประกอบการประหยัดได้'"]},
  {id:"4.1",grp:"4",gname:"การกำกับดูแลข้อมูลและการบริหารข้อมูลขนาดใหญ่ (Data Governance)",gw:10,gs68:3.0,name:"การดำเนินการด้านการกำกับดูแลข้อมูลและการบริหารข้อมูลขนาดใหญ่",w:10,s68:3.0,status:"ยังไม่เริ่ม",statusNote:"",
  good:["วางโครงสร้างการกำกับดูแลข้อมูล (Data Governance Council และ Data Steward Team) ที่ชัดเจน มีส่วนงานกลางประกอบด้วยบุคลากรด้านธุรกิจและไอที","มีคู่มือและกระบวนการทำงานที่เป็นระบบ (Repeatable) เป็นมาตรฐาน และบังคับใช้นโยบายข้อมูลทั่วองค์กร","มีการวัดประสิทธิภาพกระบวนการ ตรวจสอบคุณภาพข้อมูล และประเมิน ROI จากการบริหารข้อมูล","มี Implementation เชิงประจักษ์: คัดเลือกชุดข้อมูลสำคัญ (Critical Knowledge) จาก ERP, VCMS และ CTMS มาบริหารเป็น Big Data","มีการวิเคราะห์ผู้มีส่วนได้ส่วนเสียครบถ้วนตลอด Value Chain สื่อสารได้ดี และมีการประเมินผลการรับรู้"],
  results:["(L1-2) โครงสร้างคู่มือกำกับดูแล (V4.0) ตั้งคณะกรรมการ นโยบาย แบบประเมินคุณภาพ (DQA Checklist, DQA Self-Assessment) และวัดความคุ้มทุน (ROI) ครบถ้วน","(L3) สื่อสาร ถ่ายทอด วิเคราะห์ผู้มีส่วนได้ส่วนเสียผ่าน Value Chain และ RACI Chart รวมถึงมีหลักฐานการปฏิบัติงานจริงในฐานข้อมูลระดับองค์กร","(L4-5) มีการติดตามประเมินผลตามตัวชี้วัด นำเข้าสู่ที่ประชุมคณะทำงาน และนำผลลัพธ์ไปทบทวนเพื่อบรรจุลงในแผนปฏิบัติการดิจิทัล ปี 2568"],
  gaps:["ตกม้าตายเรื่อง GFMIS-SOE: การนำส่งข้อมูลเข้าระบบ GFMIS-SOE ของ สคร. 'ล่าช้า' — นี่คือจุดตายเชิงประจักษ์ที่ทำให้ กทท. ไม่สามารถหลุดพ้นระดับ 3 ขึ้นไปได้","KPIs ยังไม่เป็น Outcome: ตัวชี้วัดที่ส่งให้ TRIS ยังถูกมองว่าเป็นแค่ Output ไม่ได้แสดงว่า กทท. ตัดสินใจทางธุรกิจดีขึ้นแค่ไหนจากข้อมูลชุดนี้","ขาดการประยุกต์ใช้ AI และ Big Data เชิงวิเคราะห์/พยากรณ์"],
  actions:["ปรับปรุงการนำส่งข้อมูล GFMIS-SOE (Quick Win): กำหนดแนวทางการทำงานใหม่ร่วมกับ สคร. ส่งข้อมูลได้ 'ถูกต้อง ครบถ้วน ทันเวลา' โดยเด็ดขาด","ขับเคลื่อน Big Data ด้วย AI: นำ AI มาทำ Data Analytics / Predictive Analytics เพื่อพยากรณ์แนวโน้ม เช่น คาดการณ์ความหนาแน่นรถบรรทุกหรือปริมาณสินค้า","ปรับ KPI ของ Data Governance ให้เป็น Outcome: เปลี่ยนจาก 'สร้างคู่มือ/โครงสร้าง' ไปเป็น 'เพิ่มรายได้ ลดเวลา หรือยกระดับความพึงพอใจลูกค้าได้กี่เปอร์เซ็นต์จากการใช้ Big Data'"],
  docs:["GFMIS-SOE SLA Report: เอกสารยืนยันสถิติการส่งมอบข้อมูลให้ สคร. ที่ตรงเวลาและไม่มีความผิดพลาด 100% ตลอดปี","Data Analytics Use Cases: รายงานผลการประยุกต์ใช้ AI และ Big Data แสดงว่า กทท. ใช้ข้อมูลจาก ERP, VCMS, CTMS สร้างแบบจำลองเชิงพยากรณ์ปรับปรุงการทำงานของท่าเรืออย่างไร","Outcome & Value Realization Report: รายงานผลการกำกับดูแลข้อมูลที่แสดงเป็นตัวเลขเชิงเศรษฐศาสตร์หรือประสิทธิภาพที่เพิ่มขึ้น (Business/Public Value)"],
  bp:["กทท. และ กทพ. เป็น Best Practice ในกลุ่ม (3.0000) เหนือกว่า รฟม. (2.8333) เพราะโชว์การตั้งคณะทำงาน จัดการโครงสร้าง และกำหนดฐานข้อมูลได้ชัดเจน","กุญแจปลดล็อคปี 69: แก้ไขปัญหา GFMIS-SOE และนำ Big Data ที่ กทท. จัดระเบียบไว้อย่างดีไปเข้ากระบวนการ 'วิเคราะห์ด้วย AI (Predictive Analytics)' เพื่อให้เกิด Outcome เชิงตัวเลขธุรกิจ"]},
  {id:"5.1",grp:"5",gname:"การบริหารความมั่นคงปลอดภัยสารสนเทศ (Information Security)",gw:10,gs68:3.4,name:"การบริหารจัดการความมั่นคงปลอดภัยสารสนเทศ (ISMS)",w:4,s68:3.4,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กำหนดกระบวนการบริหาร ISMS อย่างเป็นระบบ ทำซ้ำได้ (Repeatable) เป็นมาตรฐาน (Standardized) สอดคล้องกับ ISO 27001","มีการกำหนดนโยบายหรือแผนการบริหารจัดการครอบคลุมประเด็นสำคัญ","มีการถ่ายทอดแนวทางปฏิบัติทั่วองค์กร วิเคราะห์ผู้มีส่วนได้ส่วนเสีย และประเมินการรับรู้อย่างครบถ้วน","มีหลักฐาน Implementation เชิงประจักษ์ — เป็นจุดแข็งที่ทำให้คะแนนทะลุระดับ 3 ขึ้นมาได้","เริ่มมีการกำหนดการวัด ติดตาม วิเคราะห์ ตัววัดผลลัพธ์ (Outcome) แล้ว"],
  results:["(L1-3) มีหลักฐานครบถ้วนทั้งกระบวนการ นโยบาย การสื่อสาร และการนำไปปฏิบัติจริง","(L4-5) มีการประเมินตัววัดผลลัพธ์ (Outcome) และนำผลลัพธ์เข้าสู่กระบวนการทบทวนปรับปรุง นำไปเรียนรู้และจัดการความรู้"],
  gaps:["จุดสะดุดที่ Level 4-5: หลักฐานที่ส่งไปเป็นเพียง Output เช่น 'ทำตามแผนครบหรือไม่' ยังไม่ใช่ Outcome ที่สะท้อนว่าระบบความปลอดภัยดีขึ้นหรือป้องกันภัยได้ดีขึ้นอย่างไร","ขาด Leading/Lagging Indicator ที่ชัดเจน ทำให้ได้คะแนนระดับ 4 เพียงบางส่วน ไม่เต็ม 5.0"],
  actions:["ปรับ KPIs ให้เป็น Outcome: กำหนดตัวชี้วัดใหม่ เช่น 'อัตราความเสียหายจากภัยคุกคามไซเบอร์ที่ลดลง' หรือ 'ร้อยละความพร้อมใช้งานของระบบ (Service Availability)' ที่เพิ่มขึ้น","กำหนด Leading Indicator: เช่น จำนวนช่องโหว่ที่ตรวจพบและแก้ไขทันเวลา และ Lagging Indicator: เช่น จำนวนครั้งที่ระบบถูกโจมตีสำเร็จ"],
  docs:["Dashboard หรือรายงานสรุปผลการวัดด้วย Leading/Lagging Indicators: แสดงสถิติความปลอดภัยทางไซเบอร์อย่างเป็นรูปธรรม","Outcome Report ด้านความมั่นคงปลอดภัย: รายงานแสดงมูลค่าความเสียหายที่ป้องกันได้ หรือประสิทธิภาพที่เพิ่มขึ้นจากความเสถียรของระบบ","รายงานการนำผลลัพธ์ไปปรับปรุงกระบวนการ (Continuous Improvement): แสดงว่าเมื่อได้ตัวเลข Outcome มาแล้ว ผู้บริหารสั่งการให้ปรับปรุงนโยบายอย่างไร"],
  bp:["กทท. เป็น Best Practice ในกลุ่ม! คะแนน 3.4000 นำหน้า กทพ. (3.0833) และ รฟม. (3.0000) เพราะพิสูจน์ Implementation ได้ชัดเจนกว่า","กลยุทธ์ปี 69: เพียงแค่ปรับ Dashboard ตัวชี้วัดให้แสดง 3 ช่อง: 1) Leading Indicator 2) Lagging Indicator 3) Business Outcome และนำเสนอให้คณะกรรมการชุดใหญ่อนุมัติ"]},
  {id:"5.2",grp:"5",gname:"การบริหารความมั่นคงปลอดภัยสารสนเทศ (Information Security)",gw:10,gs68:3.4,name:"การบริหารจัดการความเสี่ยงด้านความมั่นคงปลอดภัยสารสนเทศ (ISMS Risk Management)",w:3,s68:3.4,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กำหนดกระบวนการบริหารความเสี่ยงด้าน ISMS อย่างเป็นระบบ ทำซ้ำได้ เป็นมาตรฐาน สอดคล้องกับ ISO 27001","มีการกำหนดแผนบริหารความเสี่ยง ติดตาม ทบทวน และรายงานความเสี่ยงอย่างครบถ้วน","มีการถ่ายทอดแนวปฏิบัติทั่วองค์กร วิเคราะห์และประเมินการรับรู้ผู้มีส่วนได้ส่วนเสีย","มี Implementation เชิงประจักษ์ที่ชัดเจน — เป็นจุดแข็งที่ทำให้สอบผ่าน Level 3 ได้อย่างเต็มภาคภูมิ"],
  results:["(L1-3) มีแนวทาง กระบวนการ และการถ่ายทอดกระบวนการบริหารความเสี่ยงด้าน ISMS แก่ผู้มีส่วนได้ส่วนเสียอย่างครบถ้วน พร้อมหลักฐานการปฏิบัติจริง","(L4-5) มีการกำหนดการวัด ติดตาม ประเมินตัววัดผลลัพธ์ (Outcome) และนำผลลัพธ์เข้าสู่กระบวนการทบทวนการกำกับดูแลดิจิทัลและแผนปฏิบัติการระยะยาว"],

  actions:["รื้อระบบ KPI ความเสี่ยงไซเบอร์: กำหนด Leading Indicator เช่น จำนวนช่องโหว่ที่ยังไม่ได้รับการแก้ไข หรือร้อยละพนักงานที่สอบผ่าน Phishing Test","เปลี่ยน Output เป็น Outcome: เปลี่ยนจาก 'ทำแผนบริหารความเสี่ยงเสร็จ' เป็น 'แผนสามารถลด Downtime ของระบบหลักลงได้กี่ชั่วโมง'","นำผลตัวเลขไปใช้ทบทวนแผน: รายงานในที่ประชุมเพื่อให้ผู้บริหารสั่งการปรับปรุงกระบวนการหรือแผนปฏิบัติการดิจิทัล"],
  docs:["Dashboard ISMS Risk Indicators: แสดงข้อมูลแยกประเภทเป็น Leading Indicator และ Lagging Indicator อย่างชัดเจน","Outcome Report: รายงานประเมินประสิทธิภาพการลดความเสี่ยง วัดเป็นมูลค่าความเสียหายที่ป้องกันได้ หรืออัตราการลดลงของภัยคุกคาม","Management Review Minutes: รายงานการประชุมที่แสดงวาระการนำผล Outcome ด้านความเสี่ยงมาพิจารณาปรับปรุงกระบวนการหรือทบทวนแผนดิจิทัล"],
  bp:["กทท. เป็น Best Practice ในกลุ่ม! คะแนน 3.4000 แซงหน้า กทพ. (3.0833) และ รฟม. (3.0000) ชัดเจน เพราะแสดง Implementation ได้ดีกว่า","Quick Win ปี 69: ตรวจสอบว่า 'ทะเบียนความเสี่ยงด้าน IT ได้ถูกจัดส่งและหลอมรวมกับความเสี่ยงองค์กร (RM&IC) แล้วหรือยัง?' และปรับรายงานให้โชว์ Leading/Lagging Indicators"]},
  {id:"5.3",grp:"5",gname:"การบริหารความมั่นคงปลอดภัยสารสนเทศ (Information Security)",gw:10,gs68:3.4,name:"การตรวจสอบการบริหารจัดการความมั่นคงปลอดภัยสารสนเทศ (ISMS Audit)",w:3,s68:3.4,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กำหนดกระบวนการตรวจสอบ ISMS Audit อย่างเป็นระบบ ทำซ้ำได้ เป็นมาตรฐาน","มีการถ่ายทอดแนวทางปฏิบัติทั่วองค์กร","วิเคราะห์และประเมินการรับรู้ผู้มีส่วนได้ส่วนเสียอย่างครบถ้วน","มีหลักฐาน Implementation ที่ชัดเจน — ทำให้ผู้ประเมินให้คะแนนทะลุระดับ 3"],
  results:["มีการกำหนดการวัด ติดตาม วิเคราะห์ตัววัดผลลัพธ์ (Outcome) ของกระบวนการ ISMS Audit และมีการนำผลลัพธ์เข้าสู่กระบวนการทบทวนการกำกับดูแล/แผนปฏิบัติการดิจิทัล รวมถึงนำผลไปเรียนรู้ จัดการความรู้ และจัดเก็บเป็นนวัตกรรม"],
  gaps:["ตัววัดประสิทธิผลยังเป็นแค่ Output เช่น 'ดำเนินงานตรวจสอบได้ 100% ตามแผน' หรือ 'มีรายงานตรวจสอบกี่ฉบับ' — TRIS ต้องการ Outcome เช่น 'จำนวนช่องโหว่ระดับสูงที่พบจาก Audit ลดลงร้อยละ XX'","ขาดกลไก Continuous Improvement เชิงประจักษ์: เมื่อตรวจสอบพบช่องโหว่ (Audit Findings) องค์กรต้องนำข้อมูลไปปรับปรุงนโยบายหรือยกระดับระบบ"],
  actions:["ปฏิวัติตัวชี้วัด ISMS Audit ให้เป็น Outcome: เช่น 'จำนวนช่องโหว่ระดับสูง (Critical Findings) จาก Audit ลดลงร้อยละ XX เทียบปีก่อน' หรือ 'ความสูญเสียทางการเงินที่ป้องกันได้จากข้อเสนอแนะของทีม Audit'","กำหนด Leading และ Lagging Indicators ชัดเจน: เช่น ร้อยละระบบสำคัญที่ผ่าน Audit ความพร้อม (Leading) และจำนวนเหตุการณ์ละเมิดความปลอดภัยที่รอดพ้นสายตา Audit (Lagging)","สร้างวงจรการทบทวนผล (Review Cycle): นำผลข้อค้นพบจาก ISMS Audit ไปเป็นวาระรายงานต่อผู้บริหาร/คณะกรรมการ"],
  docs:["Dashboard ISMS Audit (Outcome & Leading/Lagging): สรุปตัวเลขสถิติชัดเจนว่างาน Audit ส่งผลดีต่อองค์กรอย่างไรในเชิงคุณค่า","Continuous Improvement Report: หลักฐาน (รายงานประชุม/บันทึก) ที่แสดงว่าผู้บริหารสั่งการให้นำข้อบกพร่องจาก Audit ไปแก้ไขหรือปรับปรุงระบบ"],
  bp:["กทท. เป็น Best Practice ในกลุ่ม! คะแนน 3.4000 ฉีกหนีคู่เทียบ กทพ. (3.0833) และ รฟม. (3.0000) เพราะแสดง Implementation ของกระบวนการ ISMS Audit ได้ชัดเจน","กลยุทธ์ปี 69: เปลี่ยน Dashboard ตัวชี้วัดจาก 'ทำเสร็จกี่เปอร์เซ็นต์' ไปเป็น Leading/Lagging Indicators และ Outcome — แล้วโชว์ว่าผู้บริหารนำผล Audit ไปสั่งการปรับปรุงองค์กรอย่างต่อเนื่อง"]},
  {id:"6.1",grp:"6",gname:"การบริหารความต่อเนื่องทางธุรกิจและความพร้อมใช้ระบบ (BCM)",gw:10,gs68:3.0,name:"การบริหารจัดการทรัพย์สินด้านเทคโนโลยีสารสนเทศ (IT Asset Management)",w:2.5,s68:3.0,status:"ยังไม่เริ่ม",statusNote:"",
  good:["มีแนวทางจัดการทรัพย์สินครอบคลุมตั้งแต่การจัดทำ/ปรับปรุงทะเบียน การบำรุงรักษา ไปจนถึงการยกเลิกและเรียกคืน","มีการจัดทำทะเบียน IT Inventory List ทั้งฮาร์ดแวร์และซอฟต์แวร์ที่รองรับระบบองค์กรได้ครบถ้วน","นำระบบ ITSM มาใช้ในการบริหารจัดการและจัดเก็บข้อมูลทรัพย์สินอย่างเป็นระบบ","มีการถ่ายทอดแนวปฏิบัติทั่วองค์กร วิเคราะห์ผู้มีส่วนได้ส่วนเสีย และประเมินการรับรู้ครบถ้วน","มี Implementation เชิงประจักษ์ผ่านการใช้งานระบบ ITSM จริง"],
  results:["(L1-3) มีคู่มือการบันทึกบัญชีสินทรัพย์ นำ ITSM ควบคุมวงจรชีวิต IT Asset (Requisition, Configuration, Maintenance, Disposal) และมีหลักฐานการปฏิบัติงานจริงครบถ้วน","(L4) กำหนดตัวชี้วัดผลลัพธ์ 3 ตัว: 1) Service Availability 2) ความถูกต้อง/ทันกาลของข้อมูล IT Asset 3) ความสำเร็จในการจัดซื้อทดแทน EOL","(L5) นำข้อมูลจากกระบวนการวิเคราะห์เพื่อจัดทำแผนปฏิบัติการดิจิทัล ประจำปี 2568"],
  gaps:["สอบตก Level 4: TRIS มองว่า KPI 3 ตัวที่ กทท. ส่งไปเป็น Output ทั้งสิ้น — 'Service Availability' และ 'ความสำเร็จในการจัดซื้อทดแทน' คือสิ่งที่ทำตามหน้าที่ ไม่ใช่ Outcome เชิงคุณค่า","ขาด Leading/Lagging Indicator: ทำให้การนำผลลัพธ์ไปทบทวนและปรับปรุงกระบวนการต่อเนื่องยังไม่สมบูรณ์"],
  actions:["ปรับ KPI จาก Output เป็น Leading/Lagging Indicator: Leading เช่น ร้อยละเครื่อง/ซอฟต์แวร์ที่ใกล้หมดอายุ (EOL) แต่มีแผนบำรุงรักษา; Lagging เช่น จำนวนครั้งระบบหยุดชะงักจากฮาร์ดแวร์เสื่อมสภาพ","สร้างวงจรทบทวนผล: นำ Leading/Lagging ไปรายงานผู้บริหารเพื่อกำหนดงบลงทุนด้าน IT (IT Investment) ให้แม่นยำยิ่งขึ้น"],
  docs:["Dashboard/รายงานสรุปตัวชี้วัด IT Asset (Leading/Lagging Indicators): แสดงสถิติเชิงลึก ไม่ใช่แค่นับจำนวนเครื่อง","Asset Optimization Outcome: เอกสารพิสูจน์ว่าการบริหาร IT Asset ช่วยยืดอายุการใช้งาน หรือประหยัดงบประมาณการจัดซื้อซ้ำซ้อนได้อย่างไร","รายงานการประชุมที่ระบุการนำผลประเมิน Asset ไปปรับปรุงแผน: หลักฐานว่าผู้บริหารนำข้อมูลอายุ Asset ไปพิจารณาจัดสรรงบประมาณปีถัดไป"],
  bp:["กทพ. (EXAT) เป็น Best Practice ที่ 3.2500 รองลงมาคือ รฟม. (3.0625) — ทั้ง 3 องค์กรติดปัญหาเดียวกัน คือ 'ตัววัดเป็น Output ไม่ใช่ Outcome'","Quick Win ปี 69: ใน Dashboard ห้ามใช้คำว่า 'Service Availability' หรือ 'ความสำเร็จในการจัดซื้อ' ให้เปลี่ยนเป็น 'ต้นทุนซ่อมฉุกเฉินที่ลดลง (Outcome)' พร้อม Leading/Lagging ตาม TRIS แนะ"]},
  {id:"6.2",grp:"6",gname:"การบริหารความต่อเนื่องทางธุรกิจและความพร้อมใช้ระบบ (BCM)",gw:10,gs68:3.0,name:"การบริหารจัดการคอนฟิกูเรชั่น (Configuration Management)",w:2.5,s68:3.0,status:"ยังไม่เริ่ม",statusNote:"",

  actions:["ปฏิวัติ KPI Configuration Management: เลิกใช้จำนวนการเปลี่ยน Config เป็นตัวชี้วัด เปลี่ยนเป็น Outcome เช่น 'ร้อยละการลดลงของระบบล่ม (Downtime) ที่มีสาเหตุจาก Config ผิดพลาด'","กำหนด Leading/Lagging Indicators: Leading เช่น ร้อยละ Server/อุปกรณ์ที่ตั้งค่าสอดคล้องกับ Minimum Baseline 100%; Lagging เช่น จำนวน Incident จากช่องโหว่ Config","ปิดลูป Continuous Improvement: เมื่อพบข้อผิดพลาดจากการตั้งค่า ต้องมีหลักฐานการประชุมเพื่อนำปัญหาไปปรับแก้คู่มือ Minimum Baseline เวอร์ชันถัดไป"],
  docs:["Dashboard/รายงานสรุป KPI ของ Configuration Management: แบ่ง Leading/Lagging Indicator และ Outcome ชัดเจน","Root Cause & Outcome Analysis: เอกสารสรุปกรณีศึกษาแสดงว่า Minimum Baseline ที่เข้มงวดขึ้นช่วยลดช่องโหว่หรือเพิ่มความเสถียรของระบบ","Standard Revision Minutes: บันทึกการประชุมที่แสดงว่านำผลตรวจสอบ Config ไปแก้ไขคู่มือหรือแผนงานดิจิทัล"],

function smCalcLevel(id,L){
  const s=DATA.sm.subs.find(x=>x.id===id);
  const st=smState[id];
  // Check all min reqs for this level
  const mrs=s.minReqs[L]||[];
  const allMR=mrs.every((_,i)=>st.minReqChecked[L][i]);
  if(!allMR) return 0;
  // Dim multiplier
  if(s.subComps&&s.subComps[L]&&s.subComps[L].length>0){
    const checked=st.subCompChecked[L].filter(Boolean).length;
    return checked/s.subComps[L].length;
  }
  return st.dimMult[L]||0;
}
function smCalcRaw(id){
  let total=0;
  for(let L=1;L<=5;L++){
    const lScore=smCalcLevel(id,L);
    total+=lScore;
    if(lScore===0) break; // sequential gating
  }
  return total;
}
function smUpdateTarget(id){
  const raw=smCalcRaw(id);
  targets.sm[id]=raw;
}

function subs(){return DATA[curDim].subs;}
function orig(){return DATA[curDim].orig;}
function sClass(st){return st==='เสร็จแล้ว'?'s2':st==='กำลังดำเนินการ'?'s1':'s0';}
function sIcon(st){return st==='เสร็จแล้ว'?'✓':st==='กำลังดำเนินการ'?'●':'○';}
function fmt(n){return n.toFixed(4);}
function calcGroupScore(gid){const ss=subs().filter(s=>s.grp===gid);return ss.reduce((a,s)=>a+s.w*targets[curDim][s.id],0)/ss[0].gw;}
function calcTotal(){
  const tw=subs().reduce((a,s)=>a+s.w,0);
  if(curDim==='sm'){
    return subs().reduce((a,s)=>{
      const raw=smCalcRaw(s.id);
      return a+s.w/tw*raw;
    },0);
  }
  if(curDim==='cm'){
    return subs().reduce((a,s)=>{
      const raw=cmCalcRaw(s.id);
      return a+s.w/tw*raw;
    },0);
  }
  return subs().reduce((a,s)=>a+s.w/tw*targets[curDim][s.id],0);
}
function dotColor(id){
  const s=subs().find(x=>x.id===id);
  const t=curDim==='sm'?smCalcRaw(id):curDim==='cm'?cmCalcRaw(id):targets[curDim][id];

}

function renderSMSimulator(s){
  const id=s.id;
  const state=smState[id];
  // Calculate scores per level with gating
  const lvlScores=[]; let stopped=false;
  for(let L=1;L<=5;L++){
    if(stopped){lvlScores.push({score:0,blocked:true,passedMR:false,mult:0});continue;}
    const mrs=s.minReqs[L]||[];
    const passedMR=mrs.length===0||mrs.every((_,i)=>state.minReqChecked[L][i]);
    let mult=0;
    if(passedMR){
      if(s.subComps&&s.subComps[L]&&s.subComps[L].length>0){
        const checked=state.subCompChecked[L].filter(Boolean).length;
        mult=checked/s.subComps[L].length;
      } else { mult=state.dimMult[L]||0; }
    }
    const score=passedMR?mult:0;
    lvlScores.push({score,blocked:false,passedMR,mult});
    if(score===0) stopped=true;
  }
  const rawTotal=lvlScores.reduce((a,x)=>a+x.score,0);
  const wtScore=rawTotal*(s.w/100);

  // Render each level
  const levelDimLabels=s.dimLevels||[];
  // Map: if dimLevels has 5 items → L1-L5; if 4 items, first covers L1-L2
  function getDimLabel(L){
    if(levelDimLabels.length>=5) return levelDimLabels[L-1]||'';
    if(levelDimLabels.length===4){
      if(L<=2) return levelDimLabels[0]||'';
      return levelDimLabels[L-2]||'';
    }
    return levelDimLabels[L-1]||'';
  }

  let lvlHTML='';
  lvlScores.forEach((ls,i)=>{
    const L=i+1;
    const dl=getDimLabel(L);
    const mrs=s.minReqs[L]||[];
    const hasSub=s.subComps&&s.subComps[L]&&s.subComps[L].length>0;
    const subs=hasSub?s.subComps[L]:[];
    const passTag=ls.blocked?`<span class="sm-lvl-pass sm-skip">ล็อค</span>`:ls.passedMR?`<span class="sm-lvl-pass sm-pass">ผ่าน</span>`:`<span class="sm-lvl-pass sm-fail">ไม่ผ่าน</span>`;
    const scoreTag=`<span style="font-size:11px;font-weight:700;color:${ls.score>0?'#1a7a4a':'#c03020'};">${ls.score.toFixed(4)}</span>`;

    // Min Req checkboxes
    let mrHTML='';
    if(mrs.length>0){
      mrHTML=`<div class="sm-sect-lbl">🔒 Minimum Requirement (L${L})</div>`;
      mrs.forEach((txt,ri)=>{
        const chk=state.minReqChecked[L][ri]?'checked':'';
        mrHTML+=`<div class="sm-req-item"><input type="checkbox" id="mr-${id}-${L}-${ri}" ${chk} onchange="smToggleMR('${id}',${L},${ri},this.checked)"><label for="mr-${id}-${L}-${ri}">${txt}</label></div>`;
      });
    }

    // Dim multiplier
    let dimHTML=`<div class="sm-sect-lbl">📐 มิติที่ประเมิน (Dimension Multiplier)</div>`;
    if(dl) dimHTML+=`<div style="font-size:10px;color:#555;margin-bottom:5px;line-height:1.4;">${dl}</div>`;
    if(hasSub){
      dimHTML+=`<div class="sm-frac-items">`;
      subs.forEach((txt,si)=>{
        const chk=(state.subCompChecked[L]||[])[si]?'checked':'';
        const fc=subs.length>0?(state.subCompChecked[L]||[]).filter(Boolean).length:0;
        dimHTML+=`<div class="sm-req-item"><input type="checkbox" id="sc-${id}-${L}-${si}" ${chk} onchange="smToggleSC('${id}',${L},${si},this.checked)"><label for="sc-${id}-${L}-${si}">${txt}</label></div>`;
      });
      const fc=(state.subCompChecked[L]||[]).filter(Boolean).length;
      dimHTML+=`</div><div style="font-size:10px;color:#555;margin-top:3px;">✓ ${fc}/${subs.length} = <strong>${(subs.length?fc/subs.length:0).toFixed(4)}</strong></div>`;
    } else {
      const cv=state.dimMult[L]||0;
      dimHTML+=`<div class="sm-radio-grp">`;
      [[0,'0 — ไม่ผ่าน'],[0.5,'0.5 — บางส่วน'],[1,'1.0 — สมบูรณ์']].forEach(([v,lbl])=>{
        const chk=cv===v?'checked':'';
        dimHTML+=`<label><input type="radio" name="dim-${id}-${L}" value="${v}" ${chk} onchange="smSetDim('${id}',${L},${v})"> ${lbl}</label>`;
      });
      dimHTML+=`</div>`;
    }

    lvlHTML+=`<div class="sm-lvl-row${ls.blocked?' blocked':''}">
      <div class="sm-lvl-hd">
        <span class="sm-lvl-num">L${L}</span>
        <span class="sm-lvl-desc" style="font-size:9px;">${dl.substring(0,80)}${dl.length>80?'…':''}</span>
        <span style="display:flex;gap:4px;align-items:center;">${passTag}${scoreTag}</span>
      </div>
      <div class="sm-lvl-body">${mrHTML}${dimHTML}</div>
    </div>`;
  });

  return `<div class="sm-sim">
    <div class="sm-sim-hd"><span style="font-size:11px;padding:2px 8px;border-radius:6px;background:#8a5010;color:#fff;">Sim</span>Target Score Simulator — Sequential Gating</div>
    <div class="sm-scope-box">${s.scopeNote||''}</div>
    ${lvlHTML}
    <div class="sm-total-bar">
      <span class="sm-total-lbl">คะแนนดิบสะสม (0–5)</span>
      <span class="sm-raw">${rawTotal.toFixed(4)}</span>
      <span class="sm-wt">× ${s.w}% = <strong>${wtScore.toFixed(4)} pts</strong></span>
    </div>
  </div>`;
}

  if(!stDiv||!inp) return;

  if(dot) dot.style.display='none';
  // Score gradient: 0-2=red, 2-3=red-mid, 3-4=yellow, 4-5=green, 5=deep green
  let bg, color;
  if(raw >= 5.0)      { bg='#1B7B50'; color='#fff'; }
  else if(raw >= 4.0) { bg='#51BF8E'; color='#0D3D26'; }
  else if(raw >= 3.0) { bg='#F8BD21'; color='#4A3200'; }
  else if(raw >= 2.0) { bg='#FF6766'; color='#fff'; }
  else if(raw >  0)   { bg='#FFACAB'; color='#7A1010'; }
  else                { bg=''; color=''; }
  stDiv.style.background=bg;
  stDiv.style.borderLeftColor=bg||'#d4d0c8';
  inp.style.background='transparent';
  inp.style.border=bg?'none':'';
  inp.style.color=color||'#1E293B';
  inp.style.fontWeight=bg?'700':'';
}

function renderCMSimulator(s){
  const id=s.id;
  const state=cmState[id];
  const lvlScores=[]; let stopped=false;
  for(let L=1;L<=5;L++){
    if(stopped){lvlScores.push({score:0,blocked:true,passedMR:false,mult:0});continue;}
    const mrs=s.minReqs[L]||[];
    const passedMR=mrs.length===0||mrs.every((_,i)=>state.minReqChecked[L][i]);
    let mult=0;
    if(passedMR){
      if(s.subComps&&s.subComps[L]&&s.subComps[L].length>0){
        const checked=(state.subCompChecked[L]||[]).filter(Boolean).length;
        mult=checked/s.subComps[L].length;
      } else { mult=state.dimMult[L]||0; }
    }
    const score=passedMR?mult:0;
    lvlScores.push({score,blocked:false,passedMR,mult});
    if(score===0) stopped=true;
  }
  const rawTotal=lvlScores.reduce((a,x)=>a+x.score,0);
  const wtScore=rawTotal*(s.w/50); // CM total weight = 50%

  // Cross-link lookup: {level -> [dim, dim, ...]}
  const linkMap={};
  (s.links||[]).forEach(l=>{
    if(!linkMap[l.level]) linkMap[l.level]=[];
    linkMap[l.level].push(l.dim);
  });

  let lvlHTML='';
  lvlScores.forEach((ls,i)=>{
    const L=i+1;
    const dl=s.dimLevels[L-1]||'';    const mrs=s.minReqs[L]||[];
    const hasSub=s.subComps&&s.subComps[L]&&s.subComps[L].length>0;
    const subList=hasSub?s.subComps[L]:[];
    // ── CM Level status color system (0=red, 0.5=yellow, 1.0=green, blocked=gray) ──
    const lvlBg = ls.blocked ? '#b0bec5'
      : ls.score >= 1.0 ? '#51BF8E'
      : ls.score > 0    ? '#F8BD21'
      :                   '#FF6766';
    const lvlColor = ls.blocked ? '#546e7a'
      : ls.score >= 1.0 ? '#0D3D26'
      : ls.score > 0    ? '#4A3200'
      :                   '#fff';
    const hdBg = ls.blocked ? '#f4f0e8'
      : ls.score >= 1.0 ? '#e6f8f1'
      : ls.score > 0    ? '#fef9e7'
      :                   '#fff0ee';
    const passTag = ls.blocked
      ? '<span class="sm-lvl-pass sm-skip">ล็อค</span>'
      : ls.score >= 1.0
        ? '<span class="sm-lvl-pass" style="background:#51BF8E;color:#0D3D26;font-weight:700;">✓ ผ่าน</span>'
        : ls.score > 0
          ? '<span class="sm-lvl-pass" style="background:#F8BD21;color:#4A3200;font-weight:700;">◐ บางส่วน</span>'
          : '<span class="sm-lvl-pass" style="background:#FF6766;color:#fff;font-weight:700;">✗ ไม่ผ่าน</span>';
    const scoreColor = ls.blocked ? '#9ca3af'
      : ls.score >= 1.0 ? '#0D3D26'
      : ls.score > 0    ? '#4A3200'
      :                   '#c0392b';
    const scoreTag=`<span style="font-size:11px;font-weight:700;color:${scoreColor};">${ls.score.toFixed(4)}</span>`;
    // Cross-link icon for this level
    const lvlLinks=linkMap[L]||[];
    const linkIcon=lvlLinks.length>0?`<a href="https://pdee-hub.github.io/Enablers-Link-Document-69/" target="_blank" class="cm-link-icon">🔗 ${lvlLinks.join(' · ')}</a>`:'';
    let mrHTML='';
    if(mrs.length>0){
      mrHTML=`<div class="sm-sect-lbl">🔒 Minimum Requirement (L${L})</div>`;
      mrs.forEach((txt,ri)=>{
        const chk=state.minReqChecked[L][ri]?'checked':'';
        mrHTML+=`<div class="sm-req-item"><input type="checkbox" id="cm-mr-${id}-${L}-${ri}" ${chk} onchange="cmToggleMR('${id}',${L},${ri},this.checked)"><label for="cm-mr-${id}-${L}-${ri}">${txt}</label></div>`;
      });
    }
    let dimHTML=`<div class="sm-sect-lbl">📐 มิติที่ประเมิน (Dimension Multiplier)</div>`;
    if(dl) dimHTML+=`<div style="font-size:10px;color:#555;margin-bottom:5px;line-height:1.4;">${dl}</div>`;
    if(hasSub){
      dimHTML+='<div class="sm-frac-items">';
      subList.forEach((txt,si)=>{
        const chk=(state.subCompChecked[L]||[])[si]?'checked':'';
        dimHTML+=`<div class="sm-req-item"><input type="checkbox" id="cm-sc-${id}-${L}-${si}" ${chk} onchange="cmToggleSC('${id}',${L},${si},this.checked)"><label for="cm-sc-${id}-${L}-${si}">${txt}</label></div>`;
      });
      const fc=(state.subCompChecked[L]||[]).filter(Boolean).length;
      dimHTML+=`</div><div style="font-size:10px;color:#555;margin-top:3px;">✓ ${fc}/${subList.length} = <strong>${(subList.length?fc/subList.length:0).toFixed(4)}</strong></div>`;
    } else {
      const cv=state.dimMult[L]||0;
      dimHTML+='<div class="sm-radio-grp">';
      [[0,'0 — ไม่ผ่าน'],[0.5,'0.5 — บางส่วน'],[1,'1.0 — สมบูรณ์']].forEach(([v,lbl])=>{
        const chk=cv===v?'checked':'';
        dimHTML+=`<label><input type="radio" name="cm-dim-${id}-${L}" value="${v}" ${chk} onchange="cmSetDim('${id}',${L},${v})"> ${lbl}</label>`;
      });
      dimHTML+='</div>';
    }
    const kt=extractKeyTakeaway(dl);
    lvlHTML+=`<div class="sm-lvl-row${ls.blocked?' blocked':''}">      <div class="sm-lvl-hd" style="background:${hdBg};">        <span class="sm-lvl-num" style="background:${lvlBg};color:${lvlColor};">L${L}</span>        <span class="sm-lvl-desc"><span class="lvl-kt">(${kt})</span>${dl?`<button class="lvl-toggle" id="lvlbtn-${id}-${L}" onclick="event.stopPropagation();toggleLvlDetail('${id}',${L})">▼</button>`:''}        </span>        <span style="display:flex;gap:4px;align-items:center;">${linkIcon}${passTag}${scoreTag}</span>      </div>      ${dl?`<div class="sm-lvl-detail" id="lvld-${id}-${L}">${dl}</div>`:''}      <div class="sm-lvl-body">${mrHTML}${dimHTML}</div>    </div>`;
  });
  return `<div class="sm-sim">    <div class="sm-sim-hd"><span style="font-size:11px;padding:2px 8px;border-radius:6px;background:#0a8a7a;color:#fff;">Sim</span>Target Score Simulator — Sequential Gating</div>    <div class="sm-scope-box">${s.scopeNote||''}</div>    ${lvlHTML}    <div class="sm-total-bar">      <span class="sm-total-lbl">คะแนนดิบสะสม (0–5)</span>      <span class="sm-raw">${rawTotal.toFixed(4)}</span>      <span class="sm-wt">× ${s.w}% (CM 50%) = <strong>${wtScore.toFixed(4)} pts</strong></span>    </div>  </div>`;
}

function renderRight(){
  const body=document.getElementById('rightBody');
  if(!focusId){body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:13px;">คลิก sub-item ด้านซ้ายเพื่อดูรายละเอียด</div>';return;}

  const smSimHTML=curDim==='sm'?renderSMSimulator(s):curDim==='cm'?renderCMSimulator(s):curDim==='dt'?renderDTSimulator(s):'';
  const tval=curDim==='sm'?smCalcRaw(s.id):curDim==='cm'?cmCalcRaw(s.id):targets[curDim][s.id];
  // ── expandable text helper: >2 lines (140 chars) → show 15 chars + expand ──
  let _eUid=0;
  const EXP_LINE=140; // ~2 lines threshold
  const EXP_PREV=15;  // preview chars
  function expTxt(txt,lineMax=EXP_LINE,prevLen=EXP_PREV){
    if(!txt||txt.length<=lineMax) return txt||'';
    const id='ex'+(_eUid++);
    const btnStyle='border:none;background:#d8eef8;cursor:pointer;color:#0a7a9a;font-size:10px;padding:0 5px;border-radius:8px;line-height:1.5;white-space:nowrap;';
    return `<span id="${id}s">${txt.slice(0,prevLen)}<span style="color:#999;">…</span>&nbsp;<button onclick="document.getElementById('${id}s').style.display='none';document.getElementById('${id}f').style.display='inline';" style="${btnStyle}">▼</button></span><span id="${id}f" style="display:none;">${txt}&nbsp;<button onclick="document.getElementById('${id}f').style.display='none';document.getElementById('${id}s').style.display='inline';" style="${btnStyle}">▲</button></span>`;
  }
  const gH=(s.gaps||[]).map(g=>`<div class="box box-red" style="margin-bottom:6px;">• ${expTxt(g)}</div>`).join('');
  const bH=(s.bp||[]).map(b=>`<div class="box box-teal" style="margin-bottom:5px;">${expTxt(b)}</div>`).join('');
  const rH=(s.results||[]).map(r=>`<div class="match-row m-ok"><span>✓</span><span>${expTxt(r)}</span></div>`).join('');
  const lH=(s.gaps||[]).slice(0,3).map(g=>`<div class="match-row m-no"><span>✗</span><span>${g.split(':')[0]}</span><span class="m-lvl" style="background:#fcd0cc;color:#7a1010;">Gap</span></div>`).join('');
  const dH=(s.docs||[]).map(d=>`<div class="doc-row"><div class="doc-dot doc-new"></div><span style="flex:1;">${expTxt(d)}</span><span class="doc-status" style="background:#c0d0e8;color:#102848;">ต้องทำ</span></div>`).join('');
  const eH=s.statusNote?`<div style="background:#f5f0fc;border-left:3px solid #c4b0e8;border-radius:0 5px 5px 0;padding:7px 10px;font-size:11px;line-height:1.6;color:#333;">${s.statusNote}</div>`:'<div style="color:#bbb;font-size:11px;font-style:italic;">ยังไม่มีข้อมูล — รอ admin อัปเดต</div>';

  body.innerHTML=`
    <div style="padding:6px 12px;font-size:11px;background:#edeae0;border-bottom:1px solid #d4d0c8;display:flex;align-items:center;gap:8px;flex-shrink:0;position:sticky;top:0;z-index:2;">
      <span style="font-weight:700;color:#1c2b3a;">ข้อ ${s.id}</span><span style="color:#555;">${s.name}</span>
      <span style="margin-left:auto;font-size:10px;background:#e0ddd4;color:#444;padding:1px 7px;border-radius:8px;">ปัจจุบัน ${fmt(s.s68)}</span>
      <span style="font-size:10px;">→</span>
      <span style="font-size:10px;background:#c5e8d5;color:#0a4a2a;padding:1px 7px;border-radius:8px;font-weight:700;">${(curDim==='sm'||curDim==='cm')?'คำนวณ ':'เป้า '}${fmt(tval)}</span>
    </div>
    ${smSimHTML}
    <div class="frame"><div class="frame-hd fa-hd"><span class="ftag fa-tag">A</span><span style="color:#7a1010;">TRIS ต้องการ — ช่องว่างที่ต้องปิด</span></div><div class="frame-bd">${gH||'<div style="color:#999;">—</div>'}</div></div>
    <div class="frame"><div class="frame-hd fb-hd"><span class="ftag fb-tag">B</span><span style="color:#0a4a20;">หน่วยงานอื่นทำอะไรในข้อนี้ (Best Practice)</span></div><div class="frame-bd">${bH||'<div style="color:#999;">—</div>'}</div></div>
    <div class="frame"><div class="frame-hd fc-hd"><span class="ftag fc-tag">C</span><span style="color:#4a4a00;">กทท. ตอบอะไรไป</span></div><div class="frame-bd"><div class="box box-gray" style="margin-bottom:8px;">${expTxt((s.good||[''])[0]||'—',120)}</div><div style="font-size:10px;color:#888;margin-bottom:4px;font-weight:600;">ผลการดำเนินงานที่นำเสนอ:</div>${rH}<div style="font-size:10px;color:#888;margin:8px 0 4px;font-weight:600;">ช่องว่างที่ยังขาด:</div>${lH}</div></div>
    <div class="frame"><div class="frame-hd fd-hd"><span class="ftag fd-tag">D</span><span style="color:#102848;">เอกสาร / หลักฐานที่ต้องเพิ่ม</span></div><div class="frame-bd">${dH||'<div style="color:#999;">—</div>'}</div></div>
    <div class="frame" style="border-bottom:none;"><div class="frame-hd fe-hd"><span class="ftag fe-tag">E</span><span style="color:#2a1060;">สถานะการดำเนินงาน</span><span class="sbadge ${sClass(s.status)}" style="margin-left:auto;">${sIcon(s.status)} ${s.status}</span></div><div class="frame-bd">${eH}</div></div>`;
}

function toggleCL(subId,i,val){
  if(!clChecked[subId]) clChecked[subId]=[];
  clChecked[subId][i]=val;
  const row=document.getElementById('clrow-'+subId+'-'+i);
  if(!row) return;
  if(val){
    row.style.background='#E6F8F1';
    row.style.borderLeft='3px solid #51BF8E';
    row.style.borderRadius='5px';
  } else {
    row.style.background='#FFF0EE';
    row.style.borderLeft='3px solid #FF6766';
    row.style.borderRadius='5px';
  }
}

function renderChecklist(){
  if(!focusId){document.getElementById('clTitle').textContent='เลือก sub-item เพื่อดู Action Checklist';document.getElementById('clItems').innerHTML='';return;}
  const s=subs().find(x=>x.id===focusId);if(!s)return;
  document.getElementById('clTitle').textContent=`Action Checklist — ข้อ ${s.id} · เป้า ${fmt(curDim==='sm'?smCalcRaw(s.id):curDim==='cm'?cmCalcRaw(s.id):targets[curDim][s.id])}`;
  if(!clChecked[s.id]) clChecked[s.id]=s.actions.map(()=>false);
  document.getElementById('clItems').innerHTML=s.actions.map((a,i)=>{

    const style=chk
      ?'background:#E6F8F1;border-left:3px solid #51BF8E;border-radius:5px;padding:4px 8px;margin-bottom:4px;'
      :'background:#FFF0EE;border-left:3px solid #FF6766;border-radius:5px;padding:4px 8px;margin-bottom:4px;';
    return `<div class="cl-item" id="clrow-${s.id}-${i}" style="${style}"><input type="checkbox" id="cl-${s.id}-${i}" ${chk?'checked':''} onchange="toggleCL('${s.id}',${i},this.checked)"><label for="cl-${s.id}-${i}">${a}</label></div>`;
  }).join('');
}


// ── DT Simulator (Reference Panel) ────────────────────
function renderDTSimulator(s){
  const sid=s.id;
  const LINK_URL='https://pdee-hub.github.io/Enablers-Link-Document-69/';
  const lbl=s.dimLevels||[];

  // Dimension radio value for this sub-item/level
  function radVal(L){ return (dtDimRad[sid]&&dtDimRad[sid][L]!==undefined)?Number(dtDimRad[sid][L]):0; }

  // Maturity Gating: score = dimension radio (0 / 0.5 / 1.0 per level)
  let cum=0, gated=false;
  const lvlSc=[];
  for(let L=1;L<=5;L++){
    if(gated){lvlSc.push({sc:0,bl:true,ok:false,rv:0});continue;}
    const rv=radVal(L);
    const ok=(rv>=1.0);
    cum+=rv;
    lvlSc.push({sc:rv,bl:false,ok,rv});
    if(!ok) gated=true;
  }
  const raw=cum;
  const wt=raw*(s.w/100);

  // Push computed score to targets + update UI
  if(targets['dt']) targets['dt'][sid]=raw;
  requestAnimationFrame(()=>{
    const inp=document.getElementById('ti-'+sid);
    if(inp){
      inp.value=raw.toFixed(4);
      inp.style.borderColor=raw>=4?'#2a8a4a':raw>=3?'#5a8a00':raw>=2?'#c07000':'#c03020';
    }
    const dot=document.getElementById('dot-'+sid);
    if(dot) dot.className='dot '+(raw>=s.s68+0.005?'dot-up':raw<s.s68-0.005?'dot-dn':'dot-eq');
  });

  // Count minReq checkboxes (for progress display only)
  function countL(L){
    const mrs=(s.minReqs&&s.minReqs[L])||[];
    let tot=0,chk=0;
    mrs.forEach((txt,ri)=>{
      const m=txt.match(/^(.+?:\s*)((?:\d+\)[\s\S]+))$/);
      if(m){ m[2].split(/(?=\d+\))/).filter(p=>p.trim()).forEach((_,pi)=>{tot++;if(dtGetChk(sid,L,ri+'-'+pi))chk++;}); }
      else { tot++;if(dtGetChk(sid,L,ri))chk++; }
    });
    return {tot,chk};
  }

  // Render minReq item (grouped or single)
  function parseMR(txt,L,ri,bl){
    const dis=bl?'disabled':'';
    const m=txt.match(/^(.+?:\s*)((?:\d+\)[\s\S]+))$/);
    if(m){
      const header=m[1].trim();
      const parts=m[2].split(/(?=\d+\))/).filter(p=>p.trim());
      const cc=parts.filter((_,pi)=>dtGetChk(sid,L,ri+'-'+pi)).length;
      let h=`<div class="sm-req-item" style="font-weight:600;color:#444;margin-bottom:2px;">
        <span style="flex-shrink:0;color:#8a5010;font-size:12px;">●</span>
        <span>${header} <span style="font-size:9px;color:#0d3a4a;font-weight:700;">${cc}/${parts.length}</span></span></div>`;
      parts.forEach((part,pi)=>{
        const id2=`mr-dt-${sid}-${L}-${ri}-${pi}`;
        const ck=dtGetChk(sid,L,ri+'-'+pi)?'checked':'';
        h+=`<div class="sm-req-item" style="padding-left:14px;">
          <input type="checkbox" id="${id2}" ${ck} ${dis}
            onchange="dtToggleMR('${sid}',${L},'${ri}-${pi}',this.checked);renderAll();"
            style="flex-shrink:0;margin-top:1px;accent-color:#0d3a4a;">
          <label for="${id2}">${part.trim()}</label></div>`;
      });
      return h;
    }
    const id2=`mr-dt-${sid}-${L}-${ri}`;
    const ck=dtGetChk(sid,L,ri)?'checked':'';
    return `<div class="sm-req-item">
      <input type="checkbox" id="${id2}" ${ck} ${dis}
        onchange="dtToggleMR('${sid}',${L},${ri},this.checked);renderAll();"
        style="flex-shrink:0;margin-top:1px;accent-color:#0d3a4a;">
      <label for="${id2}">${txt}</label></div>`;
  }

  // Build level HTML
  let lvlHTML='';
  lvlSc.forEach((ls,i)=>{
    const L=i+1;
    const dl=lbl[L-1]||'';
    const mrs=(s.minReqs&&s.minReqs[L])||[];
    const subs=(s.subComps&&s.subComps[L])||[];
    const ints=(s.integLinks&&s.integLinks[L])||[];
    const summ=(s.levelSumm&&s.levelSumm[L-1])||dl.substring(0,60);
    const {tot,chk}=countL(L);

    const intB=ints.map(d=>`<a href="${LINK_URL}" target="_blank"
      style="font-size:9px;padding:1px 7px;border-radius:8px;background:#0d3a4a;
      color:#90d0e8;font-weight:700;text-decoration:none;white-space:nowrap;">${d}</a>`).join('');

    const xId=`lvlx-${sid}-${L}`;
    const xBtn=dl?`<button onclick="event.stopPropagation();var e=document.getElementById('${xId}'),b=this;e.style.display=e.style.display==='none'?((b.textContent='▲'),'block'):((b.textContent='▼'),'none');"
      style="border:none;background:none;cursor:pointer;font-size:10px;color:#0a7a9a;padding:0 3px;flex-shrink:0;">▼</button>`:'';
    const xPanel=dl?`<div id="${xId}" style="display:none;padding:5px 8px 6px;background:#f0f8ff;
      border-top:1px dashed #90c0e0;font-size:10px;color:#334155;line-height:1.6;">${dl}</div>`:'';

    const hdBg=ls.bl?'#ede8e0':ls.ok?'#e0f5e8':ls.rv>0?'#fef8e8':'#f4f0e8';
    const nBg=ls.bl?'#aaa':ls.ok?'#1a7a4a':ls.rv>0?'#c07000':'#0d3a4a';
    const sCol=ls.bl?'#bbb':ls.rv>=1?'#1a7a4a':ls.rv>0?'#c07000':'#aaa';

    // minReq section
    let mrH='';
    if(mrs.length){
      const pct=tot>0?Math.round(chk/tot*100):0;
      const barW=tot>0?Math.round(chk/tot*100):0;
      mrH=`<div class="sm-sect-lbl">🔒 หลักฐานขั้นต่ำ (L${L}) <span style="color:#0d3a4a;">${chk}/${tot} (${pct}%)</span></div>
        <div style="height:4px;background:#e0e8f0;border-radius:2px;margin-bottom:5px;">
          <div style="height:4px;background:${chk===tot?'#1a7a4a':'#0d3a4a'};border-radius:2px;width:${barW}%;transition:width 0.3s;"></div>
        </div>`;
      mrs.forEach((txt,ri)=>{mrH+=parseMR(txt,L,ri,ls.bl);});
    }

    // Dimension self-assessment radio
    const rv=ls.rv;
    const dis=ls.bl?'disabled':'';
    const radioOpts=[[0,'0 คะแนน — ไม่ครบ'],[0.5,'0.5 คะแนน — ทำได้บางส่วน'],[1,'1 คะแนน — ทำได้ครบตามมิติที่ประเมิน']];
    let dimH=`<div class="sm-sect-lbl" style="margin-top:8px;">📐 มิติที่ประเมิน (L${L})</div>`;
    if(dl) dimH+=`<div style="font-size:10px;color:#444;line-height:1.5;margin-bottom:6px;">${dl}</div>`;
    dimH+=`<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:4px;">`;
    radioOpts.forEach(([v,lbl2])=>{
      const ck=(rv===v)?'checked':'';
      const col=v===1?'#1a7a4a':v===0.5?'#c07000':'#c03020';
      dimH+=`<label style="display:flex;align-items:center;gap:5px;font-size:10px;
        color:${ck?col:'#444'};cursor:${ls.bl?'not-allowed':'pointer'};
        font-weight:${ck?'700':'400'};padding:3px 6px;border-radius:5px;
        background:${ck?(v===1?'#e0f5e8':v===0.5?'#fef8e0':'#fee8e8'):'transparent'};
        border:1px solid ${ck?(v===1?'#1a7a4a':v===0.5?'#c07000':'#c03020'):'transparent'};">
        <input type="radio" name="dim-dt-${sid}-${L}" value="${v}" ${ck} ${dis}
          onchange="dtSetDim('${sid}',${L},${v});"
          style="accent-color:${col};flex-shrink:0;">
        ${lbl2}</label>`;
    });
    dimH+=`</div>`;

    // จุดดักคะแนน section
    let subH='';
    if(subs.length){
      subH=`<div class="sm-sect-lbl" style="margin-top:6px;color:#7a2800;">⚠️ จุดดักคะแนน (L${L})</div>`;
      subs.forEach(t=>{subH+=`<div style="font-size:10px;color:#7a3000;margin-bottom:4px;
        padding:3px 6px 3px 10px;border-left:3px solid #f08040;line-height:1.4;">• ${t}</div>`;});
    }

    lvlHTML+=`<div class="sm-lvl-row${ls.bl?' blocked':''}">
      <div class="sm-lvl-hd" style="background:${hdBg};">
        <span class="sm-lvl-num" style="background:${nBg};">L${L}</span>
        <span class="sm-lvl-desc" style="font-size:10px;flex:1;line-height:1.4;">${summ}</span>
        <span style="display:flex;gap:3px;align-items:center;flex-shrink:0;">
          ${xBtn}${intB}
          <span style="font-size:10px;font-weight:700;color:${sCol};min-width:28px;text-align:right;">
            ${ls.bl?'—':ls.rv.toFixed(2)}</span>
        </span>
      </div>
      ${xPanel}
      <div class="sm-lvl-body"${ls.bl?' style="pointer-events:none;opacity:0.4;"':''}>
        ${mrH}${dimH}${subH}
      </div>
    </div>`;
  });

  return `<div class="sm-sim">
